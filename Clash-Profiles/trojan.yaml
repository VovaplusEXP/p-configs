port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: TROJAN-GRPC-REALITY-🇨🇭(CH)-uupupupuppupupupuuppupupupupuup-11.poki-pakipon.ir
  type: trojan
  server: uupupupuppupupupuuppupupupupuup-11.poki-pakipon.ir
  port: 62115
  uuid: '----------BanV2ray-----------'
  network: grpc
  tls: true
  servername: chi.yahoo.com
  client-fingerprint: chrome
- name: TROJAN-TCP-REALITY-🇷🇴(RO)-38.79.154.34
  type: trojan
  server: 38.79.154.34
  port: 1818
  uuid: ewpvezqjycgfeebg
  network: tcp
  tls: true
  servername: www.cloudflare.com
  client-fingerprint: chrome
proxy-groups:
- name: ⚡ Auto-Select-TROJAN
  type: url-test
  proxies: &id001
  - TROJAN-GRPC-REALITY-🇨🇭(CH)-uupupupuppupupupuuppupupupupuup-11.poki-pakipon.ir
  - TROJAN-TCP-REALITY-🇷🇴(RO)-38.79.154.34
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-TROJAN
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 TROJAN-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-TROJAN
  - 🔗 Auto-Failover-TROJAN
  - TROJAN-GRPC-REALITY-🇨🇭(CH)-uupupupuppupupupuuppupupupupuup-11.poki-pakipon.ir
  - TROJAN-TCP-REALITY-🇷🇴(RO)-38.79.154.34
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 TROJAN-Selector
