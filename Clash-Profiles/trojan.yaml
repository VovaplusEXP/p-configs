port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: TROJAN-TCP-🇩🇪(DE)-89.167.82.102
  type: trojan
  server: 89.167.82.102
  port: 2080
  uuid: Bhi3WHtOR7SGiDERv3KkOjhknaQNDWFm0NcmowUEsVE=
  network: tcp
  tls: false
  servername: 89.167.82.102
- name: TROJAN-TCP-🇩🇪(DE)-89.167.82.102_1
  type: trojan
  server: 89.167.82.102
  port: 2080
  uuid: 4iZbv+W5BAAFM0EX0vLSSCZ03nBzESmmltE67ZCIPSA=
  network: tcp
  tls: false
  servername: 89.167.82.102
proxy-groups:
- name: ⚡ Auto-Select-TROJAN
  type: url-test
  proxies: &id001
  - TROJAN-TCP-🇩🇪(DE)-89.167.82.102
  - TROJAN-TCP-🇩🇪(DE)-89.167.82.102_1
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-TROJAN
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 TROJAN-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-TROJAN
  - 🔗 Auto-Failover-TROJAN
  - TROJAN-TCP-🇩🇪(DE)-89.167.82.102
  - TROJAN-TCP-🇩🇪(DE)-89.167.82.102_1
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 TROJAN-Selector
