proxy-groups:
- name: ⚡ Auto-Select-TROJAN
  type: url-test
  proxies: &id001
  - TROJAN-TCP-REALITY-🇫🇷(FR)-179.237.75.217
  - TROJAN-TCP-REALITY-🇬🇧(GB)-179.237.75.217
  - TROJAN-WS-🇩🇪(DE)-54.36.113.184
  - TROJAN-TCP-REALITY-🇸🇪(SE)-179.237.75.217
  - TROJAN-TCP-REALITY-🇸🇪(SE)-179.237.75.217_1
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-TROJAN
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 TROJAN-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-TROJAN
  - 🔗 Auto-Failover-TROJAN
  - TROJAN-TCP-REALITY-🇫🇷(FR)-179.237.75.217
  - TROJAN-TCP-REALITY-🇬🇧(GB)-179.237.75.217
  - TROJAN-WS-🇩🇪(DE)-54.36.113.184
  - TROJAN-TCP-REALITY-🇸🇪(SE)-179.237.75.217
  - TROJAN-TCP-REALITY-🇸🇪(SE)-179.237.75.217_1
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 TROJAN-Selector
