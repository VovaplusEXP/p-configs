port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: TROJAN-TCP-🇩🇪(DE)-91.107.181.155
  type: trojan
  server: 91.107.181.155
  port: 10001
  uuid: ZfzFChpuN4h08FphLPk52NOuMCve8nMU
  network: tcp
  tls: false
  servername: 91.107.181.155
- name: TROJAN-TCP-🇫🇮(FI)-65.109.208.236
  type: trojan
  server: 65.109.208.236
  port: 54673
  uuid: Ldbgt4IUYv0S+5cFrG4vcWEbvdf8RgPGmoIXhnnOEh4=
  network: tcp
  tls: false
  servername: 65.109.208.236
proxy-groups:
- name: ⚡ Auto-Select-TROJAN
  type: url-test
  proxies: &id001
  - TROJAN-TCP-🇩🇪(DE)-91.107.181.155
  - TROJAN-TCP-🇫🇮(FI)-65.109.208.236
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-TROJAN
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 TROJAN-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-TROJAN
  - 🔗 Auto-Failover-TROJAN
  - TROJAN-TCP-🇩🇪(DE)-91.107.181.155
  - TROJAN-TCP-🇫🇮(FI)-65.109.208.236
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 TROJAN-Selector
