port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: TROJAN-WS-🇩🇪(DE)-45.130.125.156
  type: trojan
  server: 45.130.125.156
  port: 8080
  uuid: VN3zRAL4Hq
  network: ws
  tls: false
  servername: 45.130.125.156
  ws-opts:
    path: /da
    headers:
      Host: s3.aananas.ir
