port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: VMESS-TCP-TLS-🇩🇪(DE)-57.129.121.230
  type: vmess
  server: 57.129.121.230
  port: 2053
  uuid: 9309640e-d299-484a-a0e8-c9b975d94822
  network: tcp
  tls: true
  servername: 57.129.121.230
  client-fingerprint: chrome
  alterId: 0
  cipher: auto
- name: VMESS-TCP-TLS-🇩🇪(DE)-node-de.connectsuite.org
  type: vmess
  server: node-de.connectsuite.org
  port: 2053
  uuid: 9309640e-d299-484a-a0e8-c9b975d94822
  network: tcp
  tls: true
  servername: node-de.connectsuite.org
  client-fingerprint: chrome
  alterId: 0
  cipher: auto
proxy-groups:
- name: ⚡ Auto-Select-VMESS
  type: url-test
  proxies: &id001
  - VMESS-TCP-TLS-🇩🇪(DE)-57.129.121.230
  - VMESS-TCP-TLS-🇩🇪(DE)-node-de.connectsuite.org
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-TCP-TLS-🇩🇪(DE)-57.129.121.230
  - VMESS-TCP-TLS-🇩🇪(DE)-node-de.connectsuite.org
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 VMESS-Selector
