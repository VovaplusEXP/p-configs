port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: VMESS-WS-TLS-🇺🇸(US)-cf.scpnb.top
  type: vmess
  server: cf.scpnb.top
  port: 443
  uuid: 7c84ae69-f0b3-47dc-83c5-e7b5f00f5bed
  network: ws
  tls: true
  servername: vienna-bread-threats-amendment.trycloudflare.com
  client-fingerprint: chrome
  ws-opts:
    path: /7c84ae69-f0b3-47dc-83c5-e7b5f00f5bed-vm
    headers:
      Host: vienna-bread-threats-amendment.trycloudflare.com
  alterId: 0
  cipher: auto
- name: VMESS-TCP-TLS-🇬🇧(GB)-uk.connfull.org
  type: vmess
  server: uk.connfull.org
  port: 2053
  uuid: e9661ce8-ec96-4d01-862f-82a3a1953f6b
  network: tcp
  tls: true
  servername: uk.connfull.org
  client-fingerprint: chrome
  alterId: 0
  cipher: auto
- name: VMESS-TCP-TLS-🇵🇱(PL)-pl.connfull.org
  type: vmess
  server: pl.connfull.org
  port: 2053
  uuid: a1a3a9e5-9b15-456b-8c26-8bda0ef701e8
  network: tcp
  tls: true
  servername: pl.connfull.org
  client-fingerprint: chrome
  alterId: 0
  cipher: auto
- name: VMESS-TCP-TLS-🇩🇪(DE)-162.19.254.232
  type: vmess
  server: 162.19.254.232
  port: 2053
  uuid: ca58b165-0f7d-49aa-9fae-a017e8a0f884
  network: tcp
  tls: true
  servername: 162.19.254.232
  client-fingerprint: chrome
  alterId: 0
  cipher: auto
- name: VMESS-TCP-TLS-🇩🇪(DE)-162.19.254.232_1
  type: vmess
  server: 162.19.254.232
  port: 2053
  uuid: ca58b165-0f7d-49aa-9fae-a017e8a0f884
  network: tcp
  tls: true
  servername: de5.taskflowhub.org
  client-fingerprint: chrome
  alterId: 0
  cipher: null
proxy-groups:
- name: ⚡ Auto-Select-VMESS
  type: url-test
  proxies: &id001
  - VMESS-WS-TLS-🇺🇸(US)-cf.scpnb.top
  - VMESS-TCP-TLS-🇬🇧(GB)-uk.connfull.org
  - VMESS-TCP-TLS-🇵🇱(PL)-pl.connfull.org
  - VMESS-TCP-TLS-🇩🇪(DE)-162.19.254.232
  - VMESS-TCP-TLS-🇩🇪(DE)-162.19.254.232_1
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-WS-TLS-🇺🇸(US)-cf.scpnb.top
  - VMESS-TCP-TLS-🇬🇧(GB)-uk.connfull.org
  - VMESS-TCP-TLS-🇵🇱(PL)-pl.connfull.org
  - VMESS-TCP-TLS-🇩🇪(DE)-162.19.254.232
  - VMESS-TCP-TLS-🇩🇪(DE)-162.19.254.232_1
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 VMESS-Selector
