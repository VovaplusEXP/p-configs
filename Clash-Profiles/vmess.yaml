port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: VMESS-WS-TLS-🇺🇸(US)-usaapp1.jisuyun.top
  type: vmess
  server: usaapp1.jisuyun.top
  port: 2053
  uuid: 4b80aa86-4354-40bb-d2a3-47126cff0bea
  network: ws
  tls: true
  servername: usaapp1.jisuyun.top
  client-fingerprint: chrome
  ws-opts:
    path: /usavm
    headers:
      Host: usaapp1.jisuyun.top
  alterId: 0
  cipher: auto
- name: VMESS-WS-TLS-🇺🇸(US)-172.233.137.157
  type: vmess
  server: 172.233.137.157
  port: 2053
  uuid: 4b80aa86-4354-40bb-d2a3-47126cff0bea
  network: ws
  tls: true
  servername: usaapp1.jisuyun.top
  client-fingerprint: chrome
  ws-opts:
    path: /usavm
    headers:
      Host: usaapp1.jisuyun.top
  alterId: 0
  cipher: auto
- name: VMESS-TCP-TLS-🇩🇪(DE)-node-de.connectsuite.org
  type: vmess
  server: node-de.connectsuite.org
  port: 2053
  uuid: 9309640e-d299-484a-a0e8-c9b975d94822
  network: tcp
  tls: true
  servername: node-de.connectsuite.org
  client-fingerprint: chrome
  alterId: 0
  cipher: auto
- name: VMESS-WS-TLS-🇳🇱(NL)-cg1c13.waimaojd.com
  type: vmess
  server: cg1c13.waimaojd.com
  port: 443
  uuid: 3756f0f8-3973-4e40-97a3-54c811f34e5b
  network: ws
  tls: true
  servername: cg1c13.waimaojd.com
  client-fingerprint: chrome
  ws-opts:
    path: /api/v1/graphql
    headers:
      Host: cg1c13.waimaojd.com
  alterId: 0
  cipher: auto
- name: VMESS-WS-TLS-🇹🇷(TR)-chatgpt.com
  type: vmess
  server: chatgpt.com
  port: 8443
  uuid: 34392034-3920-4438-a039-392035362035
  network: ws
  tls: true
  servername: tr-1.stunnel.cc
  client-fingerprint: chrome
  ws-opts:
    path: /ws
    headers:
      Host: tr-1.stunnel.cc
  alterId: 0
  cipher: none
proxy-groups:
- name: ⚡ Auto-Select-VMESS
  type: url-test
  proxies: &id001
  - VMESS-WS-TLS-🇺🇸(US)-usaapp1.jisuyun.top
  - VMESS-WS-TLS-🇺🇸(US)-172.233.137.157
  - VMESS-TCP-TLS-🇩🇪(DE)-node-de.connectsuite.org
  - VMESS-WS-TLS-🇳🇱(NL)-cg1c13.waimaojd.com
  - VMESS-WS-TLS-🇹🇷(TR)-chatgpt.com
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-WS-TLS-🇺🇸(US)-usaapp1.jisuyun.top
  - VMESS-WS-TLS-🇺🇸(US)-172.233.137.157
  - VMESS-TCP-TLS-🇩🇪(DE)-node-de.connectsuite.org
  - VMESS-WS-TLS-🇳🇱(NL)-cg1c13.waimaojd.com
  - VMESS-WS-TLS-🇹🇷(TR)-chatgpt.com
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 VMESS-Selector
