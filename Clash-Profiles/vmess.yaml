  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-WS-TLS-🇺🇸(US)-172.236.249.24
