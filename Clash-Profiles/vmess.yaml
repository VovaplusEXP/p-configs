port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: VMESS-WS-TLS-🇺🇸(US)-172.233.137.157
  type: vmess
  server: 172.233.137.157
  port: 2053
  uuid: 4b80aa86-4354-40bb-d2a3-47126cff0bea
  network: ws
  tls: true
  servername: usaapp1.jisuyun.top
  client-fingerprint: chrome
  ws-opts:
    path: /usavm
    headers:
      Host: usaapp1.jisuyun.top
  alterId: 0
  cipher: auto
- name: VMESS-WS-TLS-🇺🇸(US)-usaapp1.jisuyun.top
  type: vmess
  server: usaapp1.jisuyun.top
  port: 2053
  uuid: 4b80aa86-4354-40bb-d2a3-47126cff0bea
  network: ws
  tls: true
  servername: usaapp1.jisuyun.top
  client-fingerprint: chrome
  ws-opts:
    path: /usavm
    headers:
      Host: usaapp1.jisuyun.top
  alterId: 0
  cipher: auto
- name: VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org
  type: vmess
  server: node-uk.connectsuite.org
  port: 2053
  uuid: c4ea2391-095d-407a-9dab-85fc7104b681
  network: tcp
  tls: true
  servername: node-uk.connectsuite.org
  client-fingerprint: chrome
  alterId: 0
  cipher: auto
- name: VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org_1
  type: vmess
  server: node-uk.connectsuite.org
  port: 2053
  uuid: c4ea2391-095d-407a-9dab-85fc7104b681
  network: tcp
  tls: true
  servername: node-uk.connectsuite.org
  client-fingerprint: chrome
  alterId: 0
  cipher: auto
proxy-groups:
- name: ⚡ Auto-Select-VMESS
  type: url-test
  proxies: &id001
  - VMESS-WS-TLS-🇺🇸(US)-172.233.137.157
  - VMESS-WS-TLS-🇺🇸(US)-usaapp1.jisuyun.top
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org_1
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-WS-TLS-🇺🇸(US)-172.233.137.157
  - VMESS-WS-TLS-🇺🇸(US)-usaapp1.jisuyun.top
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org_1
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 VMESS-Selector
