proxy-groups:
- name: ⚡ Auto-Select-VMESS
  type: url-test
  proxies: &id001
  - VMESS-WS-TLS-🇺🇸(US)-cf.scpnb.top
  - VMESS-TCP-TLS-🇮🇹(IT)-it.connfull.org
  - VMESS-TCP-TLS-🇮🇹(IT)-it.connfull.org_1
  - VMESS-TCP-TLS-🇮🇹(IT)-it.connfull.org_2
  - VMESS-TCP-TLS-🇬🇧(GB)-uk.connfull.org
  - VMESS-TCP-TLS-🇫🇷(FR)-node-fr.connectsuite.org
  - VMESS-WS-TLS-🇭🇰(HK)-cf.scpnb.top
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-WS-TLS-🇺🇸(US)-cf.scpnb.top
  - VMESS-TCP-TLS-🇮🇹(IT)-it.connfull.org
  - VMESS-TCP-TLS-🇮🇹(IT)-it.connfull.org_1
  - VMESS-TCP-TLS-🇮🇹(IT)-it.connfull.org_2
  - VMESS-TCP-TLS-🇬🇧(GB)-uk.connfull.org
  - VMESS-TCP-TLS-🇫🇷(FR)-node-fr.connectsuite.org
  - VMESS-WS-TLS-🇭🇰(HK)-cf.scpnb.top
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 VMESS-Selector
