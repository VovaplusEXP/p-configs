port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: VMESS-WS-TLS-🇦🇪(AE)-cg1c15.waimaojd.com
  type: vmess
  server: cg1c15.waimaojd.com
  port: 443
  uuid: 4378a67e-d277-44b5-a99b-a947fff1ee21
  network: ws
  tls: true
  servername: cg1c15.waimaojd.com
  client-fingerprint: chrome
  ws-opts:
    path: /api/v1/graphql
    headers:
      Host: cg1c15.waimaojd.com
  alterId: 0
  cipher: auto
- name: VMESS-WS-TLS-🇦🇪(AE)-cg1c15.waimaojd.com_1
  type: vmess
  server: cg1c15.waimaojd.com
  port: 443
  uuid: 4378a67e-d277-44b5-a99b-a947fff1ee21
  network: ws
  tls: true
  servername: cg1c15.waimaojd.com
  client-fingerprint: chrome
  ws-opts:
    path: /api/v1/graphql
    headers:
      Host: cg1c15.waimaojd.com
  alterId: 0
  cipher: auto
proxy-groups:
- name: ⚡ Auto-Select-VMESS
  type: url-test
  proxies: &id001
  - VMESS-WS-TLS-🇦🇪(AE)-cg1c15.waimaojd.com
  - VMESS-WS-TLS-🇦🇪(AE)-cg1c15.waimaojd.com_1
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-WS-TLS-🇦🇪(AE)-cg1c15.waimaojd.com
  - VMESS-WS-TLS-🇦🇪(AE)-cg1c15.waimaojd.com_1
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 VMESS-Selector
