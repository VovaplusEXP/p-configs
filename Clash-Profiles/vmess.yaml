port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: VMESS-WS-TLS-🇩🇪(DE)-d2fog4flcfgb8c.cloudfront.net
  type: vmess
  server: d2fog4flcfgb8c.cloudfront.net
  port: 443
  uuid: e070e567-7996-45a9-9016-0143420946ef
  network: ws
  tls: true
  servername: d2fog4flcfgb8c.cloudfront.net
  client-fingerprint: chrome
  ws-opts:
    path: /8536cb1926c24bbc99d7bd93350ec564
    headers:
      Host: d2fog4flcfgb8c.cloudfront.net
  alterId: 0
  cipher: auto
- name: VMESS-WS-TLS-🇩🇪(DE)-d2fog4flcfgb8c.cloudfront.net_1
  type: vmess
  server: d2fog4flcfgb8c.cloudfront.net
  port: 443
  uuid: e070e567-7996-45a9-9016-0143420946ef
  network: ws
  tls: true
  servername: d2fog4flcfgb8c.cloudfront.net
  client-fingerprint: chrome
  ws-opts:
    path: /8536cb1926c24bbc99d7bd93350ec564
    headers:
      Host: d2fog4flcfgb8c.cloudfront.net
  alterId: 0
  cipher: auto
- name: VMESS-WS-TLS-🇺🇸(US)-v2ray.codefyinc.com
  type: vmess
  server: v2ray.codefyinc.com
  port: 443
  uuid: 2c981164-9b93-4bca-94ff-b78d3f8498d7
  network: ws
  tls: true
  servername: v2ray.codefyinc.com
  client-fingerprint: chrome
  ws-opts:
    path: /vmessws
    headers:
      Host: v2ray.codefyinc.com
  alterId: 0
  cipher: auto
proxy-groups:
- name: ⚡ Auto-Select-VMESS
  type: url-test
  proxies: &id001
  - VMESS-WS-TLS-🇩🇪(DE)-d2fog4flcfgb8c.cloudfront.net
  - VMESS-WS-TLS-🇩🇪(DE)-d2fog4flcfgb8c.cloudfront.net_1
  - VMESS-WS-TLS-🇺🇸(US)-v2ray.codefyinc.com
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-WS-TLS-🇩🇪(DE)-d2fog4flcfgb8c.cloudfront.net
  - VMESS-WS-TLS-🇩🇪(DE)-d2fog4flcfgb8c.cloudfront.net_1
  - VMESS-WS-TLS-🇺🇸(US)-v2ray.codefyinc.com
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 VMESS-Selector
