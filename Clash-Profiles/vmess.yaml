proxy-groups:
- name: ⚡ Auto-Select-VMESS
  type: url-test
  proxies: &id001
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org
  - VMESS-WS-TLS-🇺🇸(US)-v2ray.codefyinc.com
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org_1
  - VMESS-TCP-TLS-🇬🇧(GB)-51.195.235.71
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org_2
  - VMESS-WS-TLS-🇩🇪(DE)-base-cdn.igetmac.ir
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-VMESS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 VMESS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-VMESS
  - 🔗 Auto-Failover-VMESS
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org
  - VMESS-WS-TLS-🇺🇸(US)-v2ray.codefyinc.com
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org_1
  - VMESS-TCP-TLS-🇬🇧(GB)-51.195.235.71
  - VMESS-TCP-TLS-🇬🇧(GB)-node-uk.connectsuite.org_2
  - VMESS-WS-TLS-🇩🇪(DE)-base-cdn.igetmac.ir
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 VMESS-Selector
