port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: SS-A256GCM-🇩🇪(DE)-162.19.254.232
  type: ss
  server: 162.19.254.232
  port: 2083
  cipher: aes-256-gcm
  password: 7NuB0Y5m3aNzkKMKlFoMwkiajsu6F36c9ok4VKEZnB4=
- name: SS-C20P-🇺🇸(US)-149.28.255.6
  type: ss
  server: 149.28.255.6
  port: 816
  cipher: chacha20-ietf-poly1305
  password: GyZ5Xo0ht41vYmW3H4
- name: SS-C20P-🇬🇧(GB)-57.129.129.247
  type: ss
  server: 57.129.129.247
  port: 19308
  cipher: chacha20-ietf-poly1305
  password: 4a055e9e903128a1
- name: SS-C20P-🇩🇪(DE)-135.125.219.2
  type: ss
  server: 135.125.219.2
  port: 12911
  cipher: chacha20-ietf-poly1305
  password: 4368f055243e225f
proxy-groups:
- name: ⚡ Auto-Select-SS
  type: url-test
  proxies: &id001
  - SS-A256GCM-🇩🇪(DE)-162.19.254.232
  - SS-C20P-🇺🇸(US)-149.28.255.6
  - SS-C20P-🇬🇧(GB)-57.129.129.247
  - SS-C20P-🇩🇪(DE)-135.125.219.2
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-SS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 SS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-SS
  - 🔗 Auto-Failover-SS
  - SS-A256GCM-🇩🇪(DE)-162.19.254.232
  - SS-C20P-🇺🇸(US)-149.28.255.6
  - SS-C20P-🇬🇧(GB)-57.129.129.247
  - SS-C20P-🇩🇪(DE)-135.125.219.2
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 SS-Selector
