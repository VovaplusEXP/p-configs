port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: SS-C20P-🇩🇪(DE)-135.125.219.2
  type: ss
  server: 135.125.219.2
  port: 12911
  cipher: chacha20-ietf-poly1305
  password: 4368f055243e225f
- name: SS-C20P-🇫🇮(FI)-62.60.255.11
  type: ss
  server: 62.60.255.11
  port: 8388
  cipher: chacha20-ietf-poly1305
  password: do1DZ-_QvkFWXzsjc_w8eT5-TeYP6U3Q
proxy-groups:
- name: ⚡ Auto-Select-SS
  type: url-test
  proxies: &id001
  - SS-C20P-🇩🇪(DE)-135.125.219.2
  - SS-C20P-🇫🇮(FI)-62.60.255.11
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-SS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 SS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-SS
  - 🔗 Auto-Failover-SS
  - SS-C20P-🇩🇪(DE)-135.125.219.2
  - SS-C20P-🇫🇮(FI)-62.60.255.11
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 SS-Selector
