port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: SS-C20P-🇦🇺(AU)-104.156.233.234
  type: ss
  server: 104.156.233.234
  port: 27116
  cipher: chacha20-ietf-poly1305
  password: bIOoi5TuImG2KccxV7-jcA7Cez+vun-c_E
- name: SS-A256GCM-🇷🇺(RU)-46.17.40.13
  type: ss
  server: 46.17.40.13
  port: 20111
  cipher: aes-256-gcm
  password: b24a80e79cee1d1f
- name: SS-A256GCM-🇷🇺(RU)-195.133.23.45
  type: ss
  server: 195.133.23.45
  port: 10125
  cipher: aes-256-gcm
  password: fbaf33bcffe53cf9
proxy-groups:
- name: ⚡ Auto-Select-SS
  type: url-test
  proxies: &id001
  - SS-C20P-🇦🇺(AU)-104.156.233.234
  - SS-A256GCM-🇷🇺(RU)-46.17.40.13
  - SS-A256GCM-🇷🇺(RU)-195.133.23.45
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-SS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 SS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-SS
  - 🔗 Auto-Failover-SS
  - SS-C20P-🇦🇺(AU)-104.156.233.234
  - SS-A256GCM-🇷🇺(RU)-46.17.40.13
  - SS-A256GCM-🇷🇺(RU)-195.133.23.45
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 SS-Selector
