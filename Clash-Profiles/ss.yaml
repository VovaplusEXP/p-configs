port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: SS-C20P-🇦🇺(AU)-45.77.232.213
  type: ss
  server: 45.77.232.213
  port: 15675
  cipher: chacha20-ietf-poly1305
  password: TWG7J1KR5KsPaV5qZI+rieueKxxafZSpCH
proxy-groups:
- name: ⚡ Auto-Select-SS
  type: url-test
  proxies: &id001
  - SS-C20P-🇦🇺(AU)-45.77.232.213
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-SS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 SS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-SS
  - 🔗 Auto-Failover-SS
  - SS-C20P-🇦🇺(AU)-45.77.232.213
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 SS-Selector
