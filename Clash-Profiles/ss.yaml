  password: TWG7J1KR5KsPaV5qZI+rieueKxxafZSpCH
proxy-groups:
- name: ⚡ Auto-Select-SS
  type: url-test
  proxies: &id001
  - SS-C20P-🇺🇸(US)-198.98.53.130
  - SS-C20P-🇳🇱(NL)-141.227.152.129
  - SS-C20P-🇱🇹(LT)-80.208.229.172
  - SS-C20P-🇦🇺(AU)-45.77.232.213
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-SS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 SS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-SS
  - 🔗 Auto-Failover-SS
  - SS-C20P-🇺🇸(US)-198.98.53.130
  - SS-C20P-🇳🇱(NL)-141.227.152.129
  - SS-C20P-🇱🇹(LT)-80.208.229.172
  - SS-C20P-🇦🇺(AU)-45.77.232.213
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 SS-Selector
