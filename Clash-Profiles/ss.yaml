  port: 443
  cipher: chacha20-ietf-poly1305
  password: eDfN7SODQceIOmIAbtJJtK
- name: SS-C20P-🇳🇱(NL)-141.227.152.129
  type: ss
  server: 141.227.152.129
  port: 8388
  cipher: chacha20-ietf-poly1305
  password: VJeAjiJ40F2Il17Elv285W
- name: SS-C20P-🇱🇹(LT)-80.208.229.172
  type: ss
  server: 80.208.229.172
  port: 443
  cipher: chacha20-ietf-poly1305
  password: 4LuSQluWs3meAy5vOo7ikZ
- name: SS-C20P-🇦🇺(AU)-45.77.232.213
  type: ss
  server: 45.77.232.213
  port: 15675
