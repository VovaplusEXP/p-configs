port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 1.1.1.1
  - 1.0.0.1
  fallback:
  - 8.8.8.8
  - 8.8.4.4
proxies:
- name: SS-A256GCM-🇭🇰(HK)-212.192.15.52
  type: ss
  server: 212.192.15.52
  port: 20166
  cipher: aes-256-gcm
  password: 7e1dd4c55bf85da5
- name: SS-C20P-🇫🇮(FI)-kovirabest4.kovira2.ir
  type: ss
  server: kovirabest4.kovira2.ir
  port: 25026
  cipher: chacha20-ietf-poly1305
  password: ebk8meap37picetb
proxy-groups:
- name: ⚡ Auto-Select-SS
  type: url-test
  proxies: &id001
  - SS-A256GCM-🇭🇰(HK)-212.192.15.52
  - SS-C20P-🇫🇮(FI)-kovirabest4.kovira2.ir
  tolerance: 50
  lazy: false
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 🔗 Auto-Failover-SS
  type: fallback
  proxies: *id001
  url: https://aistudio.google.com/prompts/new_chat
  interval: 180
  regex: Sign in|^(?!.*Permission denied).*gemini
- name: 📲 SS-Selector
  type: select
  proxies:
  - ⚡ Auto-Select-SS
  - 🔗 Auto-Failover-SS
  - SS-A256GCM-🇭🇰(HK)-212.192.15.52
  - SS-C20P-🇫🇮(FI)-kovirabest4.kovira2.ir
rule-providers:
  adblock:
    type: http
    url: https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/refs/heads/master/Filters/rules.txt
    behavior: domain
    interval: 86400
rules:
- RULE-SET,adblock,REJECT
- MATCH, 📲 SS-Selector
